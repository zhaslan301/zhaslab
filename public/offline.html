<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08090c" />
    <title>ZHASLAB — Нет сети</title>
    <style>
      :root {
        --bg: #08090c;
        --text: #f4f4f5;
        --muted: #9ca3af;
        --accent: #d4af37;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .card {
        width: min(420px, 100%);
        padding: 40px 28px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
      }

      .logo {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.25rem;
        letter-spacing: 0.18em;
        color: var(--accent);
      }

      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: var(--muted);
      }

      button {
        appearance: none;
        border: 1px solid rgba(212, 175, 55, 0.35);
        background: rgba(212, 175, 55, 0.12);
        color: var(--text);
        border-radius: 10px;
        padding: 12px 20px;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
      }

      button:hover {
        background: rgba(212, 175, 55, 0.18);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <path d="M12 4h8v4h-8V4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
        <path
          d="M12 8v5.2L8.5 22.5c0 0 3.2 3.5 7.5 3.5s7.5-3.5 7.5-3.5L20 13.2V8"
          stroke="currentColor"
          stroke-width="1.4"
          stroke-linejoin="round"
          stroke-linecap="round"
        />
        <path d="M10 15.5h12" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.45" />
        <circle cx="16" cy="18.5" r="1.1" fill="currentColor" opacity="0.65" />
      </svg>
      <h1>ZHASLAB</h1>
      <p>Нет подключения к интернету. Ваши данные сохранены локально — попробуйте обновить страницу, когда сеть вернётся.</p>
      <button type="button" onclick="location.reload()">Обновить</button>
    </div>
  </body>
</html>
